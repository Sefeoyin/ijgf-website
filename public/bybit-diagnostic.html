<!DOCTYPE html>
<html>
<head>
  <title>Bybit API Diagnostic</title>
  <style>
    body { font-family: monospace; background: #0d0f14; color: #eaecef; padding: 24px; }
    input { background: #1a1d24; border: 1px solid #333; color: #eaecef; padding: 8px 12px; width: 100%; margin-bottom: 8px; border-radius: 6px; font-family: monospace; }
    button { background: #f59e0b; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; margin: 4px; }
    button.danger { background: #f6465d; color: #fff; }
    button.blue { background: #3b82f6; color: #fff; }
    pre { background: #1a1d24; border: 1px solid #333; padding: 14px; border-radius: 8px; overflow-x: auto; font-size: 0.82rem; white-space: pre-wrap; margin: 8px 0; }
    .ok { color: #22c55e; } .err { color: #f6465d; } .warn { color: #f59e0b; }
    h3 { color: #a855f7; margin: 20px 0 8px; }
    label { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h2>🔧 Bybit Demo API Diagnostic v2</h2>

  <label>API Key</label>
  <input id="apiKey" placeholder="Paste Demo Trading API key" />
  <label>API Secret</label>
  <input id="apiSecret" type="password" placeholder="Paste Demo Trading API secret" />

  <div style="margin:12px 0;display:flex;flex-wrap:wrap;gap:6px">
    <button onclick="checkBalance()">1. Check All Balances</button>
    <button class="blue" onclick="reduceUsdc()">2. Reduce USDC $1 (test)</button>
    <button class="blue" onclick="reduceBtc()">3. Reduce BTC 1 (test)</button>
    <button class="blue" onclick="reduceEth()">4. Reduce ETH 1 (test)</button>
    <button class="danger" onclick="nukeAll()">5. NUKE ALL → zero every coin</button>
    <button onclick="addUsdt()">6. ADD USDT to challenge amount</button>
  </div>

  <label>Challenge Tier USDT</label>
  <input id="tierUsdt" value="10000" style="width:120px;display:inline-block" />

  <div id="log"></div>

  <script>
    const PROXY = '/api/bybit-proxy'

    function log(label, data, isError) {
      const el = document.getElementById('log')
      const cls = isError ? 'err' : (data?.retCode === 0 || data?.orderStatus === 'SUCCESS' ? 'ok' : 'warn')
      el.innerHTML += `<h3>${label}</h3><pre class="${cls}">${JSON.stringify(data, null, 2)}</pre>`
      window.scrollTo(0, document.body.scrollHeight)
    }

    function keys() {
      const k = document.getElementById('apiKey').value.trim()
      const s = document.getElementById('apiSecret').value.trim()
      if (!k || !s) { alert('Enter API key and secret first'); return null }
      return { k, s }
    }

    async function call(method, endpoint, params = {}) {
      const { k, s } = keys() ?? {}
      if (!k) return null
      const res = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey: k, apiSecret: s, method, endpoint, params }),
      })
      return await res.json()
    }

    async function getCoins() {
      const r = await call('GET', '/v5/account/wallet-balance', { accountType: 'UNIFIED' })
      return {
        raw: r,
        coins: r?.result?.list?.[0]?.coin ?? [],
        totalWalletBalance: r?.result?.list?.[0]?.totalWalletBalance,
      }
    }

    async function checkBalance() {
      document.getElementById('log').innerHTML = ''
      const { raw, coins, totalWalletBalance } = await getCoins()
      log('Total Wallet Balance (what Bybit UI shows)', { totalWalletBalance }, false)
      const summary = {}
      coins.forEach(c => { summary[c.coin] = { walletBalance: c.walletBalance, equity: c.equity } })
      log('Per-coin balances', summary, false)
    }

    async function reduceCoin(coin, amount) {
      const r = await call('POST', '/v5/account/demo-apply-money', {
        adjustType: 1,
        utaDemoApplyMoney: [{ coin, amountStr: String(amount) }],
      })
      log(`REDUCE ${coin} by ${amount} — response`, r, r?.retCode !== 0)
      return r?.retCode === 0 && r?.result?.orderStatus === 'SUCCESS'
    }

    async function reduceUsdc() { await reduceCoin('USDC', 1) }
    async function reduceBtc()  { await reduceCoin('BTC', 1) }
    async function reduceEth()  { await reduceCoin('ETH', 1) }

    async function nukeAll() {
      document.getElementById('log').innerHTML = ''
      const { coins, totalWalletBalance } = await getCoins()
      log('Starting balance before nuke', { totalWalletBalance }, false)

      for (const coinEntry of coins) {
        const bal = Math.floor(parseFloat(coinEntry.walletBalance ?? 0))
        if (bal <= 0) { log(`${coinEntry.coin}: already zero, skipping`, {bal}, false); continue }
        log(`Reducing ${coinEntry.coin} by ${bal}…`, { coin: coinEntry.coin, bal }, false)
        let rem = bal
        while (rem > 0) {
          const chunk = Math.min(rem, 100000)
          const r = await call('POST', '/v5/account/demo-apply-money', {
            adjustType: 1,
            utaDemoApplyMoney: [{ coin: coinEntry.coin, amountStr: String(chunk) }],
          })
          log(`  ${coinEntry.coin} reduce chunk ${chunk}`, r?.result ?? r, r?.retCode !== 0)
          rem -= chunk
        }
      }

      // Read balance after nuke
      const { totalWalletBalance: after, coins: afterCoins } = await getCoins()
      const afterSummary = {}
      afterCoins.forEach(c => { afterSummary[c.coin] = c.walletBalance })
      log('✅ Balance AFTER nuke', { totalWalletBalance: after, coins: afterSummary }, false)
    }

    async function addUsdt() {
      const tierUsdt = parseInt(document.getElementById('tierUsdt').value) || 10000
      let rem = tierUsdt
      while (rem > 0) {
        const chunk = Math.min(rem, 100000)
        const r = await call('POST', '/v5/account/demo-apply-money', {
          adjustType: 0,
          utaDemoApplyMoney: [{ coin: 'USDT', amountStr: String(chunk) }],
        })
        log(`ADD USDT chunk ${chunk}`, r?.result ?? r, r?.retCode !== 0)
        rem -= chunk
      }
      const { totalWalletBalance } = await getCoins()
      log('✅ Final balance after add', { totalWalletBalance }, false)
    }
  </script>
</body>
</html>
